<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>TiA — Amigos da Oi</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    const firebaseConfig = {

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0f1e;color:#f1f5f9;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ec4899;border-radius:3px}
    .scr{height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.08)}
    .g-pink{background:linear-gradient(135deg,#ec4899,#8b5cf6)}
    .g-field{background:linear-gradient(180deg,#14532d 0%,#166534 30%,#15803d 60%,#14532d 100%)}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fu .3s ease}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .8s linear infinite;display:inline-block;line-height:1}
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,0)}50%{box-shadow:0 0 18px 5px rgba(236,72,153,.2)}}
    .glow{animation:glow 2s ease-in-out infinite}
    input,select{color-scheme:dark;-webkit-appearance:none}
    .inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 14px;font-size:13px;color:#f1f5f9;outline:none;transition:border-color .2s}
    .inp:focus{border-color:#ec4899}.inp:disabled{opacity:.5}
    optgroup{color:#64748b;font-style:normal}
    option{color:#f1f5f9;background:#1e293b}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useMemo} = React;

/* ══════════════════════════════════════════════════
   1. CONSTANTES
══════════════════════════════════════════════════ */
const POSITIONS = ['G','Z','AL','M','A'];
const POS_LBL = {G:'Goleiro',Z:'Zagueiro',AL:'Lateral',M:'Meio-campo',A:'Atacante'};
const POS_CLR = {
  G:{bg:'#f59e0b',tx:'#78350f'},Z:{bg:'#3b82f6',tx:'#1e3a8a'},
  AL:{bg:'#f97316',tx:'#7c2d12'},M:{bg:'#10b981',tx:'#064e3b'},A:{bg:'#ef4444',tx:'#7f1d1d'}
};
const TAGS_MAP = {
  G:[],Z:['Xerife','Aéreo','Construtor','Linha'],
  AL:['Raçudo','Cruzador','Velocista','Defensivo'],
  M:['Organizador','Destrutivo','Criativo','Box-to-Box'],
  A:['Artilheiro','Driblador','Velocista','Pivô']
};
const PERS_LIST = [
  {id:'Operário',e:'⚙️'},{id:'Fominha',e:'🦁'},
  {id:'Pilhado',e:'⚡'},{id:'Maestro',e:'🎯'},{id:'Resenha',e:'😄'}
];
const PERS_EMOJI = {};
PERS_LIST.forEach(function(p){ PERS_EMOJI[p.id]=p.e; });

const ATTRS   = ['fisico','defesa','tatico','construcao','habilidade','ataque'];
const ATTR_LB = {fisico:'Físico',defesa:'Defesa',tatico:'Tático',construcao:'Construção',habilidade:'Habilidade',ataque:'Ataque'};

/* ── Matriz de pesos v4 (nenhum peso < 7.5%) ── */
const WEIGHTS = {
  G:  {defesa:.40, fisico:.25, tatico:.125, construcao:.075, habilidade:.075, ataque:.075},
  Z:  {defesa:.35, fisico:.25, tatico:.15,  construcao:.10,  habilidade:.075, ataque:.075},
  AL: {fisico:.25, defesa:.20, habilidade:.20, construcao:.15, ataque:.10, tatico:.10},
  M:  {construcao:.30, tatico:.20, fisico:.15, habilidade:.15, ataque:.10, defesa:.10},
  A:  {ataque:.35, habilidade:.20, fisico:.20, tatico:.10, construcao:.075, defesa:.075}
};

/* Rating 10→4 step 0.5 (decrescente) */
const RTNG = [];
for(var _i=0;_i<=12;_i++) RTNG.push(Math.round((10-_i*.5)*10)/10);

const DEF_ATTRS = {fisico:7,defesa:7,tatico:7,construcao:7,habilidade:7,ataque:7};

/* ══════════════════════════════════════════════════
   2. ALGORITMOS
══════════════════════════════════════════════════ */
function calcOvr(pos,attrs) {
  const w=WEIGHTS[pos]||{};
  const a=attrs||{};
  return Object.keys(w).reduce(function(s,k){return s+(a[k]||5)*w[k];},0);
}

function calcPenalty(t1,t2) {
  let o1=0,o2=0;
  t1.forEach(function(p){o1+=(p.ovr||0);});
  t2.forEach(function(p){o2+=(p.ovr||0);});
  let ad=0;
  ATTRS.forEach(function(ak){
    let s1=0,s2=0;
    t1.forEach(function(p){s1+=((p.attrs||{})[ak]||5);});
    t2.forEach(function(p){s2+=((p.attrs||{})[ak]||5);});
    ad+=Math.abs(s1/t1.length-s2/t2.length);
  });
  function tagC(t){const m={};t.forEach(function(p){(p.tags||[]).forEach(function(tg){m[tg]=(m[tg]||0)+1;});});return Object.values(m).reduce(function(s,c){return s+Math.max(0,c-1);},0);}
  function clash(t){const ps=t.map(function(p){return p.personality;});return ps.indexOf('Fominha')>=0&&ps.indexOf('Pilhado')>=0?1:0;}
  return Math.abs(o1-o2)*10+ad*5+(tagC(t1)+tagC(t2))*2+(clash(t1)+clash(t2))*3;
}

function geneticSort(sel,ppt) {
  const gks=sel.filter(function(p){return p.position==='G';});
  const nonGk=sel.filter(function(p){return p.position!=='G';});
  if(gks.length<2) return null;
  const gk1=gks[0],gk2=gks[1];
  const linha=nonGk.concat(gks.slice(2));
  const lpt=ppt-1;
  if(linha.length!==lpt*2) return null;
  let best=null,bs=Infinity;
  for(let i=0;i<1000;i++){
    const sh=linha.slice().sort(function(){return Math.random()-.5;});
    const t1=sh.slice(0,lpt),t2=sh.slice(lpt);
    const sc=calcPenalty([gk1].concat(t1),[gk2].concat(t2));
    if(sc<bs){bs=sc;best={t1:t1,t2:t2};}
  }
  if(!best) return null;
  const ord={G:0,Z:1,AL:2,M:3,A:4};
  function srt(arr){return arr.slice().sort(function(x,y){return (ord[x.position]||9)-(ord[y.position]||9);});}
  const gkP=Math.random()>.5?gk1:gk2,gkR=gkP===gk1?gk2:gk1;
  const preto=srt([gkP].concat(best.t1)),rosa=srt([gkR].concat(best.t2));
  let sp=0,sr=0;
  preto.forEach(function(p){sp+=(p.ovr||0);});
  rosa.forEach(function(p){sr+=(p.ovr||0);});
  return{preto:preto,rosa:rosa,avgP:(sp/preto.length).toFixed(2),avgR:(sr/rosa.length).toFixed(2),diff:Math.abs(sp-sr).toFixed(2),score:bs,_ts:Date.now()};
}

/* ══════════════════════════════════════════════════
   3. LIcon — React.createElement (sem JSX interno)
══════════════════════════════════════════════════ */
const _LR=window.LucideReact||{};
function LIcon(props){
  const C=_LR[props.name];
  if(C) return React.createElement(C,{size:props.size||16,style:props.style,color:props.color});
  return React.createElement('span',{style:props.style},props.fb||'•');
}

/* ══════════════════════════════════════════════════
   4. MICRO-COMPONENTES
══════════════════════════════════════════════════ */
function Spin({size}){
  return <span className="spin" style={{color:'#ec4899'}}><LIcon name="Loader2" size={size||14} fb="⟳"/></span>;
}
function PosBadge({pos,sm}){
  const c=POS_CLR[pos]||{bg:'#64748b',tx:'#0f172a'};
  const d=sm?20:26,f=sm?8:10;
  return <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:d,height:d,borderRadius:'50%',background:c.bg,color:c.tx,fontSize:f,fontWeight:900,flexShrink:0}}>{pos}</span>;
}
function OvrBadge({value}){
  const v=parseFloat(value)||0;
  const cl=v>=8.5?'#FFD700':v>=7.5?'#94a3b8':'#fb923c';
  return <span style={{color:cl,fontWeight:900,fontSize:13}}>{v.toFixed(1)}</span>;
}

/* ══════════════════════════════════════════════════
   5. PLAYER FORM
   Correção Bug: key={editing.id} ou key="new" força
   remount completo, zerando todo estado local.
   onPosChange → feed automático do filtro contextual.
══════════════════════════════════════════════════ */
function PlayerForm({initial,onSubmit,onCancel,saving,onPosChange}){
  const init=initial||{};
  const [name,setName]=useState(init.name||'');
  const [pos,setPos]=useState(init.position||'M');
  const [pers,setPers]=useState(init.personality||'Operário');
  const [tags,setTags]=useState(init.tags||[]);
  const [attrs,setAttrs]=useState(Object.assign({},DEF_ATTRS,init.attrs||{}));
  const [err,setErr]=useState('');

  /* Notifica pai sobre mudança de posição (filtro contextual) */
  useEffect(function(){if(onPosChange)onPosChange(pos);},[pos]);
  /* Reset de tags ao mudar posição (sem initial) */
  useEffect(function(){if(!initial)setTags([]);},[pos]);

  const ovr=useMemo(function(){return calcOvr(pos,attrs);},[pos,attrs]);
  function setA(key,val){setAttrs(function(a){return Object.assign({},a,{[key]:val});});}
  function togTag(tag){setTags(function(prev){if(prev.indexOf(tag)>=0)return prev.filter(function(t){return t!==tag;});if(prev.length>=3)return prev;return prev.concat([tag]);});}
  function submit(){if(!name.trim()){setErr('Digite o nome.');return;}if(saving)return;setErr('');onSubmit({name:name.trim(),position:pos,personality:pers,tags:tags,attrs:attrs,ovr:ovr});}

  const posW=WEIGHTS[pos]||{};
  const sAttrs=ATTRS.slice().sort(function(a,b){return (posW[b]||0)-(posW[a]||0);});
  const topW=Object.keys(posW).sort(function(a,b){return posW[b]-posW[a];}).slice(0,3);
  const ovrTxt=topW.map(function(k){return ATTR_LB[k].slice(0,3)+'×'+posW[k];}).join(' + ');
  const rankLbl=ovr>=8.5?'⭐ OURO':ovr>=7.5?'🥈 PRATA':'🥉 BRONZE';
  const rankClr=ovr>=8.5?'#FFD700':ovr>=7.5?'#94a3b8':'#fb923c';

  return (
    <div className="glass fu" style={{borderRadius:16,padding:16,display:'flex',flexDirection:'column',gap:12}}>
      <input value={name} onChange={function(e){setName(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')submit();}}
        placeholder="Nome do jogador" maxLength={28} disabled={saving} className="inp"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4,fontWeight:600}}>POSIÇÃO</div>
          <select value={pos} onChange={function(e){setPos(e.target.value);}} disabled={saving} className="inp">
            {POSITIONS.map(function(p){return <option key={p} value={p}>{p} — {POS_LBL[p]}</option>;})}
          </select>
        </div>
        <div>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4,fontWeight:600}}>PERSONALIDADE</div>
          <select value={pers} onChange={function(e){setPers(e.target.value);}} disabled={saving} className="inp">
            {PERS_LIST.map(function(p){return <option key={p.id} value={p.id}>{p.e} {p.id}</option>;})}
          </select>
        </div>
      </div>
      {(TAGS_MAP[pos]||[]).length>0&&(
        <div>
          <div style={{fontSize:10,color:'#64748b',marginBottom:6,fontWeight:600}}>TAGS <span style={{fontWeight:400,color:'#334155'}}>(máx. 3)</span></div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {(TAGS_MAP[pos]||[]).map(function(tag){
              const sel=tags.indexOf(tag)>=0;
              return <button key={tag} onClick={function(){togTag(tag);}} style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .15s',background:sel?'#ec4899':'rgba(255,255,255,0.05)',color:sel?'#fff':'#94a3b8',border:'1px solid '+(sel?'#ec4899':'rgba(255,255,255,0.1)')}}>{tag}</button>;
            })}
          </div>
        </div>
      )}
      <div>
        <div style={{fontSize:10,color:'#64748b',marginBottom:6,fontWeight:600}}>ATRIBUTOS</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {sAttrs.map(function(a){
            const w=posW[a]||0;
            return (
              <div key={a}>
                <div style={{fontSize:9,marginBottom:3,color:w>.25?'#ec4899':w>.1?'#8b5cf6':'#475569',fontWeight:w>0?700:400}}>
                  {ATTR_LB[a]}{w>0?' ×'+w:''}
                </div>
                <div style={{height:3,borderRadius:2,background:'rgba(255,255,255,0.07)',overflow:'hidden',marginBottom:4}}>
                  <div style={{height:'100%',width:((attrs[a]-4)/6*100)+'%',background:w>.25?'#ec4899':w>.1?'#8b5cf6':'#334155',borderRadius:2}}/>
                </div>
                <select value={attrs[a]} onChange={function(e){setA(a,parseFloat(e.target.value));}} disabled={saving} className="inp" style={{padding:'6px 10px',fontSize:12}}>
                  {RTNG.map(function(v){return <option key={v} value={v}>{v%1===0?v+'.0':''+v}</option>;})}
                </select>
              </div>
            );
          })}
        </div>
      </div>
      {/* Overall em tempo real — visível apenas no formulário */}
      <div style={{background:'rgba(0,0,0,0.25)',border:'1px solid '+rankClr+'44',borderRadius:12,padding:'10px 14px',textAlign:'center'}}>
        <div style={{fontSize:9,color:'#94a3b8',letterSpacing:'0.08em',marginBottom:1}}>{rankLbl} — OVERALL PONDERADO</div>
        <div style={{fontSize:30,fontWeight:900,color:rankClr,lineHeight:1.1,textShadow:'0 0 12px '+rankClr+'60'}}>{ovr.toFixed(1)}</div>
        <div style={{fontSize:9,color:'#475569',marginTop:2}}>{ovrTxt}</div>
      </div>
      {err!==''&&<div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'#f87171',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.15)',borderRadius:10,padding:'7px 11px'}}><LIcon name="AlertCircle" size={11} fb="⚠"/> {err}</div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={onCancel} disabled={saving} style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,padding:'11px',fontSize:12,fontWeight:700,color:'#94a3b8',cursor:'pointer'}}>
          Cancelar
        </button>
        <button onClick={submit} disabled={saving} className="g-pink" style={{flex:2,border:'none',borderRadius:12,padding:'11px',fontSize:13,fontWeight:900,color:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          {saving?<Spin size={12}/>:<LIcon name="Check" size={13} fb="✓"/>}
          {saving?'Salvando...':(initial?'Salvar':'Adicionar')}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   6. ELENCO TAB
   Melhorias: filtro contextual, sort, cards mini-dashboard
══════════════════════════════════════════════════ */
function ElencoTab({players,onAdd,onDel,onEdit,saving,loading}){
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const [filter,setFilter]=useState('ALL');
  const [sortMode,setSortMode]=useState('default');
  const [formPos,setFormPos]=useState('M');

  const formOpen=showForm||editing!=null;

  function openNew(){setEditing(null);setShowForm(true);setFormPos('M');}
  function openEdit(p){setShowForm(false);setEditing(p);setFormPos(p.position);}
  function closeForm(){setShowForm(false);setEditing(null);}
  function handlePosChange(p){setFormPos(p);}

  /* Filtro: contextual quando formulário aberto, manual quando fechado */
  const effectiveFilter=formOpen?formPos:filter;
  let list=effectiveFilter==='ALL'?players:players.filter(function(p){return p.position===effectiveFilter;});
  if(sortMode==='alpha') list=list.slice().sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  else if(sortMode==='ovr') list=list.slice().sort(function(a,b){return (b.ovr||0)-(a.ovr||0);});

  const cnt={};
  POSITIONS.forEach(function(p){cnt[p]=players.filter(function(x){return x.position===p;}).length;});

  return (
    <div className="scr fu" style={{padding:16,paddingBottom:96,display:'flex',flexDirection:'column',gap:12}}>
      {/* Position counters */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
        {POSITIONS.map(function(p){
          const active=filter===p&&!formOpen;
          return (
            <button key={p} onClick={function(){if(!formOpen){setFilter(function(f){return f===p?'ALL':p;});}}} className="glass" style={{borderRadius:12,padding:'8px 4px',cursor:'pointer',textAlign:'center',background:active?'rgba(236,72,153,0.12)':undefined,border:active?'1px solid rgba(236,72,153,0.35)':undefined}}>
              <div style={{fontSize:20,fontWeight:900,color:active?'#ec4899':'#f1f5f9'}}>{cnt[p]||0}</div>
              <PosBadge pos={p} sm/>
            </button>
          );
        })}
      </div>

      {/* Form or Add button */}
      {showForm?(
        <PlayerForm key="new" onSubmit={function(d){onAdd(d);closeForm();}} onCancel={closeForm} saving={saving} onPosChange={handlePosChange}/>
      ):editing?(
        <PlayerForm key={editing.id} initial={editing} onSubmit={function(d){onEdit(Object.assign({id:editing.id},d));closeForm();}} onCancel={closeForm} saving={saving} onPosChange={handlePosChange}/>
      ):(
        <button onClick={openNew} className="g-pink" style={{border:'none',borderRadius:14,padding:13,fontSize:13,fontWeight:900,color:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <LIcon name="UserPlus" size={15} fb="+"/> CADASTRAR JOGADOR
        </button>
      )}

      {/* Context hint when form open */}
      {formOpen&&(
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'#f59e0b',background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:10,padding:'6px 12px'}}>
          <LIcon name="Eye" size={12} fb="👁"/> Comparando com {POS_LBL[formPos]}s cadastrados
        </div>
      )}

      {/* Filters + sort when form closed */}
      {!formOpen&&(
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {['ALL'].concat(POSITIONS).map(function(f){
              const active=filter===f;
              return <button key={f} onClick={function(){setFilter(f);setSortMode('default');}} style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',background:active?'#ec4899':'rgba(255,255,255,0.05)',color:active?'#fff':'#94a3b8',border:'1px solid '+(active?'#ec4899':'rgba(255,255,255,0.1)')}}>{f==='ALL'?'Todos ('+players.length+')':f+' · '+(cnt[f]||0)}</button>;
            })}
          </div>
          <div style={{display:'flex',gap:5}}>
            {[{id:'default',lbl:'Padrão'},{id:'alpha',lbl:'A–Z'},{id:'ovr',lbl:'Maior OVR'}].map(function(s){
              const active=sortMode===s.id;
              return <button key={s.id} onClick={function(){setSortMode(s.id);}} style={{padding:'3px 9px',borderRadius:20,fontSize:10,fontWeight:700,cursor:'pointer',background:active?'rgba(139,92,246,0.25)':'rgba(255,255,255,0.04)',color:active?'#a78bfa':'#475569',border:'1px solid '+(active?'rgba(139,92,246,0.4)':'rgba(255,255,255,0.07)')}}>{s.lbl}</button>;
            })}
          </div>
        </div>
      )}

      {/* Player list */}
      {loading?(
        <div style={{textAlign:'center',padding:40,color:'#475569'}}><Spin size={22}/><div style={{marginTop:8,fontSize:12}}>Carregando elenco...</div></div>
      ):list.length===0?(
        <div style={{textAlign:'center',padding:'48px 0',color:'#334155',fontSize:13}}>

  );
}

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
function ConvoTab({players,selected,onToggle,onToggleAll,onSort,ppt,setPpt,loading,sorting}){
  const [search,setSearch]=useState('');
  const sel=players.filter(function(p){return selected.has(p.id);});
  const total=sel.length,gkN=sel.filter(function(p){return p.position==='G';}).length;
  const lineN=total-gkN,needed=ppt*2,lineNd=needed-2;
  const canGo=total===needed&&gkN===2&&!sorting;
  const pct=Math.min((total/needed)*100,100);
  const barC=total>needed?'#ef4444':total===needed?'#10b981':'#ec4899';
  const allSel=players.length>0&&players.every(function(p){return selected.has(p.id);});
  const filtered=players.filter(function(p){return p.name.toLowerCase().indexOf(search.toLowerCase())>=0;});

  function SBadge(props){
    return <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:20,background:props.ok?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)',border:'1px solid '+(props.ok?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'),color:props.ok?'#10b981':'#f87171'}}>{props.ok?'🟢':'🔴'} {props.label}</div>;
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{flexShrink:0,padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
        <div className="glass" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:14}}>
          <LIcon name="SlidersHorizontal" size={13} fb="≡"/>
          <span style={{fontSize:12,color:'#94a3b8',flex:1}}>Jogadores por time</span>
          <button onClick={function(){setPpt(function(v){return Math.max(5,v-1);});}} style={{width:27,height:27,borderRadius:8,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'white',cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
          <span style={{fontWeight:900,fontSize:18,color:'#ec4899',width:20,textAlign:'center'}}>{ppt}</span>
          <button onClick={function(){setPpt(function(v){return Math.min(11,v+1);});}} style={{width:27,height:27,borderRadius:8,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'white',cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          <SBadge ok={gkN===2} label={'Goleiros '+gkN+'/2'}/>
          <SBadge ok={lineN===lineNd} label={'Linha '+lineN+'/'+lineNd}/>
          <SBadge ok={total===needed} label={'Total '+total+'/'+needed}/>
        </div>
        <div style={{height:3,borderRadius:2,background:'rgba(255,255,255,0.06)',overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:barC,transition:'width .3s,background .3s'}}/>
        </div>
        <button onClick={function(){if(canGo)onSort();}} disabled={!canGo} className={canGo?'g-pink glow':''} style={{border:'none',borderRadius:14,padding:14,fontSize:13,fontWeight:900,cursor:canGo?'pointer':'not-allowed',display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:canGo?'white':'#334155',background:canGo?undefined:'rgba(255,255,255,0.04)'}}>
          {sorting?<Spin size={16}/>:<LIcon name="Shuffle" size={16} fb="🔀"/>}
          {sorting?'Processando 1.000 permutações...':'SORTEAR '+needed+' JOGADORES'}
        </button>
        <div style={{position:'relative'}}>
          <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'#475569',lineHeight:1}}><LIcon name="Search" size={13} fb="🔍"/></span>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Buscar jogador…" className="inp" style={{paddingLeft:32}}/>
        </div>
        <button onClick={onToggleAll} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'#475569',background:'none',border:'none',cursor:'pointer',padding:'2px 0'}}>
          <LIcon name={allSel?'CheckSquare':'Square'} size={12} fb={allSel?'☑':'☐'}/>
          {allSel?'Desmarcar todos':'Marcar todos'}
        </button>
      </div>
      <div className="scr" style={{flex:1,padding:'0 16px',paddingBottom:80}}>
        {loading?(<div style={{textAlign:'center',padding:32,color:'#475569'}}><Spin size={18}/></div>)
        :players.length===0?(<div style={{textAlign:'center',padding:'48px 0',color:'#334155',fontSize:13}}>Cadastre jogadores no Elenco primeiro.</div>)
        :(POSITIONS.map(function(pos){
          const grp=filtered.filter(function(p){return p.position===pos;});
          if(!grp.length) return null;
          const sc=grp.filter(function(p){return selected.has(p.id);}).length;
          return (
            <div key={pos} style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <PosBadge pos={pos} sm/>
                <span style={{fontSize:9,fontWeight:800,color:'#334155',letterSpacing:'0.06em'}}>{POS_LBL[pos].toUpperCase()}</span>

                <span style={{fontSize:9,color:'#334155'}}>{sc}/{grp.length}</span>

              <div style={{display:'flex',flexDirection:'column',gap:5}}>

                      <div style={{width:17,height:17,borderRadius:5,border:'2px solid '+(isSel?'#ec4899':'rgba(255,255,255,0.15)'),background:isSel?'#ec4899':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
                        {isSel&&<LIcon name="Check" size={9} fb="✓"/>}
                      </div>
                      <PosBadge pos={p.position} sm/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                        <div style={{fontSize:9,color:'#475569'}}>{(PERS_EMOJI[p.personality]||'')+' '+(p.tags||[]).join(' · ')}</div>
                      </div>
                      <OvrBadge value={p.ovr||0}/>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   9. TIMES TAB
══════════════════════════════════════════════════ */
function TimesTab({teams,onResort,sorting}){
  const [local,setLocal]=useState(teams);
  const [swapId,setSwapId]=useState(null);
  useEffect(function(){setLocal(teams);setSwapId(null);},[teams]);

  function handleClick(pl){
    if(!swapId){setSwapId(pl.id);return;}
    if(swapId===pl.id){setSwapId(null);return;}
    const t=local; if(!t) return;
    const all=t.preto.concat(t.rosa);
    let p1=null; all.forEach(function(p){if(p.id===swapId)p1=p;});
    if(!p1){setSwapId(null);return;}
    const p2=pl;
    const p1P=t.preto.some(function(p){return p.id===swapId;}),p2P=t.preto.some(function(p){return p.id===p2.id;});
    if(p1P===p2P){setSwapId(p2.id);return;}
    const newP=t.preto.map(function(p){return p.id===swapId?p2:p.id===p2.id?p1:p;});
    const newR=t.rosa.map(function(p){return p.id===swapId?p2:p.id===p2.id?p1:p;});
    let sp=0,sr=0; newP.forEach(function(p){sp+=(p.ovr||0);}); newR.forEach(function(p){sr+=(p.ovr||0);});
    setLocal(Object.assign({},t,{preto:newP,rosa:newR,avgP:(sp/newP.length).toFixed(2),avgR:(sr/newR.length).toFixed(2),diff:Math.abs(sp-sr).toFixed(2),_ts:Date.now()}));
    setSwapId(null);
  }

  async function handleDownload(){
    const el=document.getElementById('tc'); if(!el||!window.html2canvas) return;
    try{const canvas=await window.html2canvas(el,{backgroundColor:'#0a0f1e',scale:2,useCORS:true,logging:false});const a=document.createElement('a');a.download='times-tia.png';a.href=canvas.toDataURL('image/png');a.click();}catch(e){console.error(e);}
  }

  function handleWA(){
    const t=local; if(!t) return;
    function byPos(team,pos){return team.filter(function(p){return p.position===pos;}).map(function(p){return p.name;});}
    function fmt(team,nome,avg){const ls=['⚽ '+nome+' - Média: '+avg];POSITIONS.forEach(function(pos){const ns=byPos(team,pos);if(ns.length)ls.push(pos+': '+ns.join(', '));});return ls.join('\n');}
    const txt=['Preparem-se para ficar putos!! Saiu a escalação da TiA para nossa pela de segunda:','',fmt(t.preto,'Preto',t.avgP),'',fmt(t.rosa,'Rosa',t.avgR)].join('\n');
    window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  }

  if(!local){return <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,padding:32,textAlign:'center'}}><div style={{fontSize:52}}>⚽</div><p style={{color:'#334155',fontSize:13,lineHeight:1.7}}>Selecione jogadores na aba <strong style={{color:'#ec4899'}}>Pelada</strong> e clique em sortear.</p></div>;}

  const t=local,d=parseFloat(t.diff)||0;
  const bLb=d<=.5?'Perfeito!':d<=1.5?'Muito equilibrado!':d<=3?'Bom equilíbrio':'Desequilibrado';
  const bCl=d<=1.5?'#10b981':d<=3?'#f59e0b':'#ef4444';

  return (
    <div className="scr" style={{paddingBottom:90}}>
      <div style={{padding:'12px 16px 0'}}>
        <div className="glass" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderRadius:14}}>
          <div><div style={{fontSize:9,color:'#475569',marginBottom:2,letterSpacing:'0.07em'}}>EQUILÍBRIO</div><div style={{fontSize:22,fontWeight:900,color:bCl}}>Δ {t.diff}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:10,fontWeight:700,color:bCl}}><LIcon name="Zap" size={11} fb="⚡"/> {bLb}</div><div style={{fontSize:9,color:'#334155',marginTop:2}}>Penalty: {Math.round(t.score||0)}</div></div>
        </div>
      </div>
      {swapId&&<div style={{margin:'8px 16px 0',padding:'7px 12px',borderRadius:10,background:'rgba(250,204,21,0.08)',border:'1px solid rgba(250,204,21,0.25)',fontSize:10,color:'#fbbf24',textAlign:'center'}}>🔄 Toque em um jogador do time adversário para trocar</div>}
      <div id="tc" style={{padding:'8px 16px',display:'flex',flexDirection:'column',gap:10,background:'#0a0f1e'}}>
        <TeamField team={t.preto} isBlack={true}  label="TIME PRETO" avgOvr={t.avgP} swapId={swapId} onCk={handleClick}/>
        <TeamField team={t.rosa}  isBlack={false} label="TIME ROSA"  avgOvr={t.avgR} swapId={swapId} onCk={handleClick}/>
      </div>
      <div style={{padding:'8px 16px 0',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        <button onClick={function(){if(!sorting)onResort();}} disabled={sorting} style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,padding:'11px 4px',fontSize:11,fontWeight:700,color:'#94a3b8',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
          {sorting?<Spin size={11}/>:<LIcon name="RotateCcw" size={12} fb="↺"/>} Ressortear
        </button>
        <button onClick={handleDownload} style={{background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.25)',borderRadius:12,padding:'11px 4px',fontSize:11,fontWeight:700,color:'#818cf8',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
          <LIcon name="Download" size={12} fb="⬇"/> Download
        </button>
        <button onClick={handleWA} style={{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:12,padding:'11px 4px',fontSize:11,fontWeight:700,color:'#4ade80',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
          <span>📲</span> WhatsApp
        </button>
      </div>
      {swapId&&<div style={{padding:'6px 16px 0'}}><button onClick={function(){setSwapId(null);}} style={{width:'100%',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:12,padding:'9px',fontSize:11,fontWeight:700,color:'#f87171',cursor:'pointer'}}>✕ Cancelar troca</button></div>}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   10. JOGADOR TAB — FUT Card Premium + Exportação
══════════════════════════════════════════════════ */
function JogadorTab({players}){
  const [selId,setSelId]=useState('');
  const player=selId?players.find(function(p){return p.id===selId;})||null:null;

  /* Agrupa por posição para o optgroup */
  const grouped={};
  POSITIONS.forEach(function(pos){
    const g=players.filter(function(p){return p.position===pos;}).sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
    if(g.length>0) grouped[pos]=g;
  });

  async function downloadCard(){
    const el=document.getElementById('fut-card');
    if(!el||!window.html2canvas) return;
    try{
      const canvas=await window.html2canvas(el,{backgroundColor:null,scale:3,useCORS:true,logging:false});
      const a=document.createElement('a');
      a.download=(player?player.name.replace(/\s+/g,'_'):'atleta')+'_TiA.png';
      a.href=canvas.toDataURL('image/png'); a.click();
    }catch(e){console.error(e);}
  }

  /* Rank colors */
  const ovr=player?(player.ovr||0):0;
  const isGold=ovr>=8.5,isSilv=ovr>=7.5&&!isGold;
  const ovColor=isGold?'#FFD700':isSilv?'#CBD5E1':'#FB923C';
  const rankLbl=isGold?'⭐ OURO':isSilv?'🥈 PRATA':'🥉 BRONZE';
  const topAccent=isGold?'linear-gradient(90deg,#92400e,#fbbf24,#92400e)':isSilv?'linear-gradient(90deg,#334155,#94a3b8,#334155)':'linear-gradient(90deg,#7c2d12,#f97316,#7c2d12)';
  const sectionBg=isGold?'rgba(133,77,14,0.18)':isSilv?'rgba(71,85,105,0.18)':'rgba(124,45,18,0.18)';
  const attrs=player?(player.attrs||{}):DEF_ATTRS;
  const posW=player?(WEIGHTS[player.position]||{}):{};

  return (
    <div className="scr fu" style={{padding:16,paddingBottom:96,display:'flex',flexDirection:'column',gap:16}}>
      {/* Selector */}
      <div>
        <div style={{fontSize:10,color:'#64748b',marginBottom:6,fontWeight:600,letterSpacing:'0.06em'}}>SELECIONAR ATLETA</div>
        <select value={selId} onChange={function(e){setSelId(e.target.value);}} className="inp">
          <option value="">— Escolha um jogador —</option>
          {POSITIONS.map(function(pos){
            if(!grouped[pos]) return null;
            return (
              <optgroup key={pos} label={POS_LBL[pos]}>
                {grouped[pos].map(function(p){
                  return <option key={p.id} value={p.id}>{p.name} · OVR {(p.ovr||0).toFixed(1)}</option>;
                })}
              </optgroup>
            );
          })}
        </select>
      </div>

      {!player&&(
        <div style={{textAlign:'center',padding:'48px 0',color:'#334155',fontSize:13}}>
          <div style={{fontSize:40,marginBottom:12}}>🃏</div>
          Selecione um atleta para gerar o FUT Card.
        </div>
      )}

      {player&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {/* ── FUT CARD (capturável) ── */}
          <div id="fut-card" style={{background:'linear-gradient(160deg,#0d1929 0%,#1e293b 45%,#0d1929 100%)',borderRadius:22,overflow:'hidden',border:'1px solid rgba(148,163,184,0.15)',position:'relative'}}>
            {/* Rank accent top bar */}
            <div style={{height:4,background:topAccent}}/>

            {/* Top section */}
            <div style={{padding:'20px 20px 16px',textAlign:'center',background:sectionBg,position:'relative'}}>
              {/* Rank badge */}
              <div style={{position:'absolute',top:14,left:14,background:'rgba(0,0,0,0.5)',borderRadius:8,padding:'3px 9px',fontSize:10,fontWeight:800,color:ovColor,letterSpacing:'0.06em'}}>{rankLbl}</div>

              {/* Position badge top-right */}
              <div style={{position:'absolute',top:14,right:14}}>
                <PosBadge pos={player.position}/>
              </div>

              {/* Overall */}
              <div style={{fontSize:62,fontWeight:900,color:ovColor,lineHeight:1,textShadow:'0 0 24px '+ovColor+'55',marginTop:8}}>
                {ovr.toFixed(1)}
              </div>

              {/* Position label */}
              <div style={{display:'inline-block',marginTop:5,background:'rgba(0,0,0,0.45)',borderRadius:6,padding:'3px 12px',fontSize:10,fontWeight:800,color:'rgba(255,255,255,0.85)',letterSpacing:'0.08em'}}>
                {player.position} · {POS_LBL[player.position]}
              </div>

              {/* Divider */}
              <div style={{height:1,background:topAccent,margin:'12px 0',opacity:.6}}/>

              {/* Name */}
              <div style={{fontSize:19,fontWeight:900,color:'#f1f5f9',letterSpacing:'0.01em',lineHeight:1.2,marginBottom:8}}>
                {player.name}
              </div>

              {/* Tags + personality */}
              <div style={{display:'flex',justifyContent:'center',flexWrap:'wrap',gap:5}}>
                {(player.tags||[]).map(function(t){
                  return <span key={t} style={{background:'rgba(0,0,0,0.4)',border:'1px solid '+ovColor+'44',borderRadius:20,padding:'2px 9px',fontSize:10,color:'rgba(255,255,255,0.8)',fontWeight:600}}>{t}</span>;
                })}
                {player.personality&&(
                  <span style={{background:'rgba(0,0,0,0.4)',border:'1px solid '+ovColor+'44',borderRadius:20,padding:'2px 9px',fontSize:10,color:'rgba(255,255,255,0.8)',fontWeight:600}}>
                    {(PERS_EMOJI[player.personality]||'')} {player.personality}
                  </span>
                )}
              </div>
            </div>

            {/* Attr bars section */}
            <div style={{background:'rgba(0,0,0,0.25)',padding:'16px 20px 22px',display:'flex',flexDirection:'column',gap:10}}>
              {ATTRS.map(function(a){
                const v=(attrs[a])||5;
                const w=posW[a]||0;
                const barPct=((v-4)/6*100);
                const barColor=w>.25?ovColor:w>.1?'rgba(255,255,255,0.65)':'rgba(255,255,255,0.3)';
                return (
                  <div key={a} style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:76,fontSize:11,color:w>.25?ovColor:'rgba(255,255,255,0.6)',fontWeight:w>.25?800:500,textAlign:'right',letterSpacing:'0.01em'}}>{ATTR_LB[a]}</div>
                    <div style={{flex:1,height:7,background:'rgba(0,0,0,0.45)',borderRadius:4,overflow:'hidden'}}>
                      <div style={{height:'100%',width:barPct+'%',background:barColor,borderRadius:4,transition:'width .5s'}}/>
                    </div>
                    <div style={{width:26,fontSize:12,fontWeight:700,color:barColor,textAlign:'right'}}>{v}</div>
                  </div>
                );
              })}
            </div>

            {/* Card footer */}
            <div style={{background:'rgba(0,0,0,0.35)',padding:'8px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:9,color:'rgba(255,255,255,0.25)',letterSpacing:'0.06em'}}>TiA — AMIGOS DA OI</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,0.25)',letterSpacing:'0.06em'}}>MATCHMAKING ENGINE v4</div>
            </div>
          </div>

          {/* Download button */}
          <button onClick={downloadCard} style={{background:'rgba(99,102,241,0.12)',border:'1px solid rgba(99,102,241,0.3)',borderRadius:14,padding:'13px 16px',fontSize:13,fontWeight:700,color:'#818cf8',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <LIcon name="Download" size={15} fb="⬇"/> 📸 Baixar Card do Jogador
          </button>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   11. APP ROOT
══════════════════════════════════════════════════ */
function App(){
  const [db,setDb]=useState(window.__db||null);
  const [api,setApi]=useState(window.__fsAPI||null);
  const [fbErr,setFbErr]=useState(window.__fbErr||null);
  const [players,setPlayers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [sorting,setSorting]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const [teams,setTeams]=useState(null);
  const [ppt,setPpt]=useState(7);
  const [tab,setTab]=useState('elenco');

  useEffect(function(){
    if(db) return;
    function onReady(){setDb(window.__db);setApi(window.__fsAPI);}
    function onErr(){setFbErr(window.__fbErr||'Erro Firebase');}
    window.addEventListener('firebase-ready',onReady,{once:true});
    window.addEventListener('firebase-error',onErr,{once:true});
    return function(){window.removeEventListener('firebase-ready',onReady);window.removeEventListener('firebase-error',onErr);};
  },[db]);

  useEffect(function(){
    if(!db||!api) return;
    setLoading(true);
    const unsub=api.onSnapshot(
      api.collection(db,'jogadores'),
      function(snap){
        /* Os dados são preservados — apenas recalculamos o OVR com os novos pesos */
        const data=snap.docs.map(function(d){
          const p=Object.assign({id:d.id},d.data());
          p.ovr=calcOvr(p.position,p.attrs||{});
          return p;
        });
        data.sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0);});
        setPlayers(data);
        const vid=new Set(data.map(function(p){return p.id;}));
        setSelected(function(prev){const arr=Array.from(prev).filter(function(id){return vid.has(id);});const c=new Set(arr);return c.size===prev.size?prev:c;});
        setLoading(false);
      },
      function(e){console.error(e);setLoading(false);}
    );
    return unsub;
  },[db,api]);

  async function addP(data){if(saving)return;setSaving(true);try{await api.addDoc(api.collection(db,'jogadores'),Object.assign({},data,{createdAt:Date.now()}));}catch(e){console.error(e);}finally{setSaving(false);}}
  async function delP(id){if(saving)return;setSaving(true);try{await api.deleteDoc(api.doc(db,'jogadores',id));}catch(e){console.error(e);}finally{setSaving(false);}}
  async function editP(data){if(saving)return;setSaving(true);try{const id=data.id;const f=Object.assign({},data);delete f.id;await api.updateDoc(api.doc(db,'jogadores',id),f);}catch(e){console.error(e);}finally{setSaving(false);}}

  function togPlayer(id){setSelected(function(s){const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function togAll(){const a=players.every(function(p){return selected.has(p.id);});setSelected(a?new Set():new Set(players.map(function(p){return p.id;})));}

  function doSort(){
    const sel=players.filter(function(p){return selected.has(p.id);});
    setSorting(true);
    setTimeout(function(){
      const r=geneticSort(sel,ppt);
      if(r){setTeams(r);setTab('times');}
      setSorting(false);
    },60);
  }

  if(!db&&!fbErr){return <div style={{minHeight:'100dvh',background:'#0a0f1e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}><div style={{fontSize:48}}>🤖</div><p style={{color:'#ec4899',fontWeight:700,fontSize:14}}>Conectando ao Firebase...</p></div>;}
  if(fbErr){return <div style={{minHeight:'100dvh',background:'#0a0f1e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:32,textAlign:'center'}}><div style={{fontSize:44}}>⚠️</div><p style={{color:'#f87171',fontWeight:700}}>Erro ao conectar</p><p style={{color:'#475569',fontSize:11,maxWidth:280}}>{fbErr}</p><button onClick={function(){window.location.reload();}} style={{marginTop:8,padding:'10px 20px',borderRadius:12,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'#94a3b8',cursor:'pointer',fontSize:12}}>Tentar novamente</button></div>;}

  const savingBadge=saving?<div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,fontWeight:700,color:'#ec4899',background:'rgba(236,72,153,0.08)',border:'1px solid rgba(236,72,153,0.2)',borderRadius:20,padding:'3px 8px'}}><Spin size={9}/> SALVANDO</div>:!loading?<div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'#10b981'}}><span style={{width:5,height:5,borderRadius:'50%',background:'#10b981',display:'inline-block'}}/>AO VIVO</div>:null;

  const TABS=[
    {id:'elenco', lbl:'Elenco',  icon:'Users',  fb:'👥'},
    {id:'pelada', lbl:'Pelada',  icon:'Shield', fb:'🛡'},
    {id:'times',  lbl:'Times',   icon:'Trophy', fb:'🏆'},
    {id:'jogador',lbl:'Jogador', icon:'User',   fb:'👤'},
  ];

  return (
    <div style={{maxWidth:430,margin:'0 auto',height:'100dvh',display:'flex',flexDirection:'column',background:'#0a0f1e'}}>
      {/* Header */}
      <div className="glass" style={{flexShrink:0,padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
        <svg width="32" height="32" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="19" y1="2" x2="19" y2="7" stroke="#94a3b8" strokeWidth="2.2" strokeLinecap="round"/>
          <circle cx="19" cy="1.8" r="2.2" fill="#f472b6"/>
          <rect x="8" y="7" width="22" height="15" rx="4" fill="#1e293b"/>
          <rect x="8" y="7" width="22" height="15" rx="4" stroke="#475569" strokeWidth="0.8"/>
          <rect x="11" y="11" width="6" height="5" rx="1.5" fill="#1d4ed8"/>
          <rect x="12.5" y="12.5" width="2.5" height="2" rx="0.5" fill="#bfdbfe"/>
          <rect x="21" y="11" width="6" height="5" rx="1.5" fill="#be185d"/>
          <rect x="22.5" y="12.5" width="2.5" height="2" rx="0.5" fill="#fbcfe8"/>
          <rect x="12" y="18.5" width="14" height="1.8" rx="0.9" fill="#0f172a"/>
          <circle cx="15" cy="19.4" r="0.8" fill="#22c55e"/>
          <circle cx="19" cy="19.4" r="0.8" fill="#22c55e"/>
          <circle cx="23" cy="19.4" r="0.8" fill="#22c55e"/>
          <rect x="16" y="22" width="6" height="3.5" rx="1.5" fill="#334155"/>
          <path d="M5 28 L11 24.5 L19 26 L19 37 L7 37 Z" fill="#111827"/>
          <path d="M33 28 L27 24.5 L19 26 L19 37 L31 37 Z" fill="#ec4899"/>
          <path d="M3 29 L5 28 L7 37 L3 33 Z" fill="#0f172a"/>
          <path d="M35 29 L33 28 L31 37 L35 33 Z" fill="#db2777"/>
          <path d="M16 25.5 Q19 23 22 25.5 L20.5 26 Q19 24.5 17.5 26 Z" fill="#334155"/>
        </svg>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:900,fontSize:14,lineHeight:1.2}}>TiA — Amigos da Oi</div>
          <div style={{fontSize:9,color:'#334155',letterSpacing:'0.04em'}}>{players.length} ATLETAS · ENGINE v4</div>
        </div>
        {savingBadge}
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='elenco'  && <ElencoTab  players={players} onAdd={addP} onDel={delP} onEdit={editP} saving={saving} loading={loading}/>}
        {tab==='pelada'  && <ConvoTab   players={players} selected={selected} onToggle={togPlayer} onToggleAll={togAll} onSort={doSort} ppt={ppt} setPpt={setPpt} loading={loading} sorting={sorting}/>}
        {tab==='times'   && <TimesTab   teams={teams} onResort={doSort} sorting={sorting}/>}
        {tab==='jogador' && <JogadorTab players={players}/>}
      </div>

      {/* Bottom Tab Bar — 4 abas */}
      <div className="glass" style={{flexShrink:0,display:'flex',borderTop:'1px solid rgba(255,255,255,0.06)',paddingBottom:'max(10px,env(safe-area-inset-bottom))'}}>
        {TABS.map(function(tc){
          const active=tab===tc.id;
          const hasDot=tc.id==='times'&&teams!=null;
          return (
            <button key={tc.id} onClick={function(){setTab(tc.id);}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 4px 8px',background:'none',border:'none',cursor:'pointer',color:active?'#ec4899':'#334155',transition:'color .15s',position:'relative'}}>
              <span style={{position:'relative',lineHeight:1}}>
                <LIcon name={tc.icon} size={19} fb={tc.fb}/>
                {hasDot&&<span style={{position:'absolute',top:-3,right:-5,width:7,height:7,borderRadius:'50%',background:'#ec4899',border:'1.5px solid #0a0f1e'}}/>}
              </span>
              <span style={{fontSize:8,fontWeight:active?800:400,letterSpacing:'0.05em'}}>{tc.lbl.toUpperCase()}</span>
              {active&&<div style={{width:18,height:2,borderRadius:1,background:'linear-gradient(90deg,#ec4899,#8b5cf6)'}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
