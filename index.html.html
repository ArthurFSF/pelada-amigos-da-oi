<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

/* ══════════ CONSTANTS ══════════════════════════════════════ */
const POSITIONS=['G','Z','AL','M','A'];
const POS_LBL={G:'Goleiro',Z:'Zagueiro',AL:'Lateral',M:'Meio-campo',A:'Atacante'};
const POS_CLR={G:{bg:'#f59e0b',tx:'#78350f'},Z:{bg:'#3b82f6',tx:'#1e3a8a'},AL:{bg:'#f97316',tx:'#7c2d12'},M:{bg:'#10b981',tx:'#064e3b'},A:{bg:'#ef4444',tx:'#7f1d1d'}};
const TAGS_MAP={G:[],Z:['Xerife','Aéreo','Construtor','Linha'],AL:['Raçudo','Cruzador','Velocista','Defensivo'],M:['Organizador','Destrutivo','Criativo','Box-to-Box'],A:['Artilheiro','Driblador','Velocista','Pivô']};
const PERS_LIST=[{id:'Operário',e:'⚙️'},{id:'Fominha',e:'🦁'},{id:'Pilhado',e:'⚡'},{id:'Maestro',e:'🎯'},{id:'Resenha',e:'😄'}];
const PERS_EMOJI={};PERS_LIST.forEach(function(p){PERS_EMOJI[p.id]=p.e;});
const ATTRS=['fisico','defesa','tatico','construcao','habilidade','ataque'];
const ATTR_LB={fisico:'Físico',defesa:'Defesa',tatico:'Tático',construcao:'Construção',habilidade:'Habilidade',ataque:'Ataque'};
const WEIGHTS={
  G:{defesa:.40,fisico:.25,tatico:.125,construcao:.075,habilidade:.075,ataque:.075},
  Z:{defesa:.35,fisico:.25,tatico:.15,construcao:.10,habilidade:.075,ataque:.075},
  AL:{fisico:.25,defesa:.20,habilidade:.20,construcao:.15,ataque:.10,tatico:.10},
  M:{construcao:.30,tatico:.20,fisico:.15,habilidade:.15,ataque:.10,defesa:.10},
  A:{ataque:.35,habilidade:.20,fisico:.20,tatico:.10,construcao:.075,defesa:.075}
};
const RTNG=[];for(var _i=0;_i<=12;_i++)RTNG.push(Math.round((10-_i*.5)*10)/10);
const DEF_ATTRS={fisico:7,defesa:7,tatico:7,construcao:7,habilidade:7,ataque:7};
// Radar axis order (clockwise from top)
const RKEYS=['fisico','defesa','habilidade','ataque','construcao','tatico'];
const RLBLS=['Físico','Defesa','Habilid.','Ataque','Construção','Tático'];

/* ══════════ ALGORITHMS ═════════════════════════════════════ */
function calcOvr(pos,attrs){const w=WEIGHTS[pos]||{};const a=attrs||{};return Object.keys(w).reduce(function(s,k){return s+(a[k]||5)*w[k];},0);}
function calcPenalty(t1,t2){let o1=0,o2=0;t1.forEach(function(p){o1+=(p.ovr||0);});t2.forEach(function(p){o2+=(p.ovr||0);});let ad=0;ATTRS.forEach(function(ak){let s1=0,s2=0;t1.forEach(function(p){s1+=((p.attrs||{})[ak]||5);});t2.forEach(function(p){s2+=((p.attrs||{})[ak]||5);});ad+=Math.abs(s1/t1.length-s2/t2.length);});function tagC(t){const m={};t.forEach(function(p){(p.tags||[]).forEach(function(tg){m[tg]=(m[tg]||0)+1;});});return Object.values(m).reduce(function(s,c){return s+Math.max(0,c-1);},0);}function clash(t){const ps=t.map(function(p){return p.personality;});return ps.indexOf('Fominha')>=0&&ps.indexOf('Pilhado')>=0?1:0;}return Math.abs(o1-o2)*10+ad*5+(tagC(t1)+tagC(t2))*2+(clash(t1)+clash(t2))*3;}
function geneticSort(sel,ppt){const gks=sel.filter(function(p){return p.position==='G';});const nonGk=sel.filter(function(p){return p.position!=='G';});if(gks.length<2)return null;const gk1=gks[0],gk2=gks[1];const linha=nonGk.concat(gks.slice(2));const lpt=ppt-1;if(linha.length!==lpt*2)return null;let best=null,bs=Infinity;for(let i=0;i<1000;i++){const sh=linha.slice().sort(function(){return Math.random()-.5;});const t1=sh.slice(0,lpt),t2=sh.slice(lpt);const sc=calcPenalty([gk1].concat(t1),[gk2].concat(t2));if(sc<bs){bs=sc;best={t1:t1,t2:t2};}}if(!best)return null;const ord={G:0,Z:1,AL:2,M:3,A:4};function srt(arr){return arr.slice().sort(function(x,y){return (ord[x.position]||9)-(ord[y.position]||9);});}const gkP=Math.random()>.5?gk1:gk2,gkR=gkP===gk1?gk2:gk1;const preto=srt([gkP].concat(best.t1)),rosa=srt([gkR].concat(best.t2));let sp=0,sr=0;preto.forEach(function(p){sp+=(p.ovr||0);});rosa.forEach(function(p){sr+=(p.ovr||0);});return{preto:preto,rosa:rosa,avgP:(sp/preto.length).toFixed(2),avgR:(sr/rosa.length).toFixed(2),diff:Math.abs(sp-sr).toFixed(2),score:bs,_ts:Date.now()};}

/* ══════════ UTILITY: resize photo → base64 ════════════════ */
function resizePhoto(file, maxPx, quality, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      let w=img.width,h=img.height,m=maxPx||320;
      if(w>m||h>m){if(w>h){h=Math.round(h*m/w);w=m;}else{w=Math.round(w*m/h);h=m;}}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',quality||0.82));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ══════════ LIcon — React.createElement (no JSX inside) ═══ */
const _LR=window.LucideReact||{};
function LIcon(p){const C=_LR[p.name];if(C)return React.createElement(C,{size:p.size||16,style:p.style,color:p.color});return React.createElement('span',{style:p.style},p.fb||'•');}

/* ══════════ MICRO-COMPONENTS ═══════════════════════════════ */
function Spin({size}){return <span className="spin" style={{color:'#ec4899'}}><LIcon name="Loader2" size={size||14} fb="⟳"/></span>;}
function PosBadge({pos,sm}){const c=POS_CLR[pos]||{bg:'#64748b',tx:'#0f172a'};const d=sm?20:26,f=sm?8:10;return <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:d,height:d,borderRadius:'50%',background:c.bg,color:c.tx,fontSize:f,fontWeight:900,flexShrink:0}}>{pos}</span>;}
function OvrBadge({value}){const v=parseFloat(value)||0;const cl=v*10>=85?'#FFD700':v*10>=75?'#94a3b8':'#fb923c';return <span style={{color:cl,fontWeight:900,fontSize:13}}>{v.toFixed(1)}</span>;}

      <path d="M40,7 L73,17 L73,56 Q73,78 40,87 Q7,78 7,56 L7,17 Z" fill="none" stroke="white" strokeWidth="0.8" opacity="0.3"/>
      <text x="40" y="24" textAnchor="middle" fill="white" fontSize="9" fontWeight="900" fontFamily="Arial Black,sans-serif" letterSpacing="0.5">FUTEBOL</text>
      <text x="40" y="34" textAnchor="middle" fill="white" fontSize="7" fontWeight="700" fontFamily="Arial,sans-serif">AMIGOS DA OI</text>
      <line x1="14" y1="38" x2="66" y2="38" stroke="white" strokeWidth="0.6" opacity="0.4"/>
      <circle cx="40" cy="58" r="15" fill="none" stroke="white" strokeWidth="1.2"/>
      <circle cx="40" cy="58" r="10" fill="none" stroke="white" strokeWidth="0.6" opacity="0.5"/>
      <text x="40" y="62" textAnchor="middle" fill="white" fontSize="14" fontFamily="sans-serif">⚽</text>
      <line x1="14" y1="75" x2="66" y2="75" stroke="white" strokeWidth="0.6" opacity="0.4"/>
      <text x="40" y="84" textAnchor="middle" fill="white" fontSize="5.5" letterSpacing="2" fontFamily="Arial,sans-serif">DESDE 2018</text>
    </svg>
  );
}

/* ══════════ RANK BADGE SVG ════════════════════════════════ */
function RankBadge({ovr100}){
  const isG=ovr100>=85,isS=ovr100>=75;
  const tier=isG?1:isS?2:3,name=isG?'OURO':isS?'PRATA':'BRONZE';
  const c1=isG?'#FFD700':isS?'#D8D8D8':'#CD9550',c2=isG?'#7A5100':isS?'#5A5A5A':'#7A3F00';
  return (
    <svg width="68" height="78" viewBox="0 0 68 78">
      <defs>
        <radialGradient id={'rg'+tier} cx="50%" cy="38%" r="62%">
          <stop offset="0%" stopColor={c1} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={c2} stopOpacity="0.95"/>
        </radialGradient>
      </defs>
      <path d="M34,2 L66,12 L66,52 Q66,70 34,76 Q2,70 2,52 L2,12 Z" fill={'url(#rg'+tier+')'} stroke={c1} strokeWidth="1.8"/>
      <path d="M34,8 L60,17 L60,50 Q60,66 34,72 Q8,66 8,50 L8,17 Z" fill="none" stroke={c1} strokeWidth="0.8" opacity="0.45"/>
      <circle cx="34" cy="38" r="19" fill={c2} stroke={c1} strokeWidth="1.5" opacity="0.9"/>
      <text x="34" y="35" textAnchor="middle" dominantBaseline="middle" fill={c1} fontSize="20" fontWeight="900" fontFamily="Arial Black,sans-serif">{tier}</text>
      <text x="34" y="53" textAnchor="middle" fill={c1} fontSize="7" fontWeight="800" letterSpacing="1.2" fontFamily="Arial,sans-serif">{name}</text>
    </svg>
  );
}

/* ══════════ RADAR CHART (Hexagonal Spider Web) ════════════ */
function RadarChart({attrs,position}){
  const SZ=130,cx=SZ/2,cy=SZ/2,maxR=SZ*.39;
  const N=RKEYS.length;
  function ang(i){return(-Math.PI/2)+i*(2*Math.PI/N);}
  function pt(i,frac){const a=ang(i);return{x:cx+maxR*frac*Math.cos(a),y:cy+maxR*frac*Math.sin(a)};}
  function makePath(frac){return RKEYS.map(function(_,i){const p=pt(i,frac);return(i===0?'M':'L')+p.x.toFixed(2)+','+p.y.toFixed(2);}).join('')+'Z';}
  const rings=[.2,.4,.6,.8,1];
  const dataPath=RKEYS.map(function(k,i){const v=Math.min(Math.max(attrs[k]||5,4),10);const frac=v/10;const p=pt(i,frac);return(i===0?'M':'L')+p.x.toFixed(2)+','+p.y.toFixed(2);}).join('')+'Z';
  const ovr100=calcOvr(position,attrs)*10;
  const ac=ovr100>=85?'#FFD700':ovr100>=75?'#C8C8C8':'#F97316';
  const acFill=ovr100>=85?'rgba(255,215,0,0.28)':ovr100>=75?'rgba(200,200,200,0.28)':'rgba(249,115,22,0.28)';
  return (
    <svg width={SZ} height={SZ} viewBox={'0 0 '+SZ+' '+SZ}>
      {rings.map(function(r,ri){return <path key={ri} d={makePath(r)} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="0.7"/>;}) }
      {RKEYS.map(function(_,i){const outer=pt(i,1);return <line key={i} x1={cx.toFixed(1)} y1={cy.toFixed(1)} x2={outer.x.toFixed(2)} y2={outer.y.toFixed(2)} stroke="rgba(255,255,255,0.14)" strokeWidth="0.8"/>;}) }
      <path d={dataPath} fill={acFill} stroke={ac} strokeWidth="1.8" strokeLinejoin="round"/>
      {RKEYS.map(function(k,i){const v=Math.min(Math.max(attrs[k]||5,4),10);const p=pt(i,v/10);return <circle key={i} cx={p.x.toFixed(2)} cy={p.y.toFixed(2)} r="2.8" fill={ac} stroke="rgba(0,0,0,0.5)" strokeWidth="0.6"/>;}) }
      {RLBLS.map(function(lbl,i){const p=pt(i,1.36);return <text key={i} x={p.x.toFixed(1)} y={p.y.toFixed(1)} textAnchor="middle" dominantBaseline="middle" fontSize="6.5" fill="rgba(255,255,255,0.45)" fontFamily="sans-serif">{lbl}</text>;}) }
    </svg>
  );
}

/* ══════════ PLAYER FORM ════════════════════════════════════ */
function PlayerForm({initial,onSubmit,onCancel,saving,onPosChange}){
  const init=initial||{};
  const [name,setName]=useState(init.name||'');
  const [pos,setPos]=useState(init.position||'M');
  const [pers,setPers]=useState(init.personality||'Operário');
  const [tags,setTags]=useState(init.tags||[]);
  const [attrs,setAttrs]=useState(Object.assign({},DEF_ATTRS,init.attrs||{}));
  const [foto,setFoto]=useState(init.foto||'');
  const [err,setErr]=useState('');
  useEffect(function(){if(onPosChange)onPosChange(pos);},[pos]);
  useEffect(function(){if(!initial)setTags([]);},[pos]);
  const ovr=useMemo(function(){return calcOvr(pos,attrs);},[pos,attrs]);
  function setA(key,val){setAttrs(function(a){return Object.assign({},a,{[key]:val});});}
  function togTag(tag){setTags(function(prev){if(prev.indexOf(tag)>=0)return prev.filter(function(t){return t!==tag;});if(prev.length>=3)return prev;return prev.concat([tag]);});}
  function handlePhoto(e){const f=e.target.files&&e.target.files[0];if(!f)return;resizePhoto(f,320,.82,function(b64){setFoto(b64);});}
  function submit(){if(!name.trim()){setErr('Digite o nome.');return;}if(saving)return;setErr('');onSubmit({name:name.trim(),position:pos,personality:pers,tags:tags,attrs:attrs,ovr:ovr,foto:foto});}
  const posW=WEIGHTS[pos]||{};
  const sAttrs=ATTRS.slice().sort(function(a,b){return (posW[b]||0)-(posW[a]||0);});
  const topW=Object.keys(posW).sort(function(a,b){return posW[b]-posW[a];}).slice(0,3);
  const ovrTxt=topW.map(function(k){return ATTR_LB[k].slice(0,3)+'×'+posW[k];}).join(' + ');
  const ovr100=Math.round(ovr*10);
  const rankClr=ovr100>=85?'#FFD700':ovr100>=75?'#94a3b8':'#fb923c';
  const rankLbl=ovr100>=85?'⭐ OURO':ovr100>=75?'🥈 PRATA':'🥉 BRONZE';
  return (
    <div className="glass fu" style={{borderRadius:16,padding:16,display:'flex',flexDirection:'column',gap:12}}>
      {/* Photo upload */}
      <div>
        <div style={{fontSize:10,color:'#64748b',marginBottom:6,fontWeight:600}}>FOTO DO ATLETA</div>
        {foto?(
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <img src={foto} style={{width:56,height:56,borderRadius:'50%',objectFit:'cover',objectPosition:'top',border:'2px solid rgba(236,72,153,0.4)',flexShrink:0}} alt=""/>
            <div style={{flex:1,fontSize:11,color:'#64748b'}}>Foto carregada ✓</div>
            <button onClick={function(){setFoto('');}} style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,padding:'4px 8px',fontSize:11,color:'#f87171',cursor:'pointer'}}>Remover</button>
          </div>
        ):(
          <label style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'rgba(255,255,255,0.04)',border:'1px dashed rgba(255,255,255,0.15)',borderRadius:12,cursor:'pointer'}}>
            <LIcon name="Camera" size={18} fb="📷" style={{color:'#64748b'}}/>
            <span style={{fontSize:12,color:'#64748b'}}>Adicionar foto do atleta</span>
            <input type="file" accept="image/*" onChange={handlePhoto} style={{display:'none'}}/>
          </label>
        )}
      </div>
      <input value={name} onChange={function(e){setName(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')submit();}} placeholder="Nome do jogador" maxLength={28} disabled={saving} className="inp"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4,fontWeight:600}}>POSIÇÃO</div>
          <select value={pos} onChange={function(e){setPos(e.target.value);}} disabled={saving} className="inp">
            {POSITIONS.map(function(p){return <option key={p} value={p}>{p} — {POS_LBL[p]}</option>;})}
          </select>
        </div>
        <div>
          <div style={{fontSize:10,color:'#64748b',marginBottom:4,fontWeight:600}}>PERSONALIDADE</div>
          <select value={pers} onChange={function(e){setPers(e.target.value);}} disabled={saving} className="inp">
            {PERS_LIST.map(function(p){return <option key={p.id} value={p.id}>{p.e} {p.id}</option>;})}
          </select>
        </div>
      </div>
      {(TAGS_MAP[pos]||[]).length>0&&(
        <div>
          <div style={{fontSize:10,color:'#64748b',marginBottom:6,fontWeight:600}}>TAGS <span style={{fontWeight:400,color:'#334155'}}>(máx. 3)</span></div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {(TAGS_MAP[pos]||[]).map(function(tag){const sel=tags.indexOf(tag)>=0;return <button key={tag} onClick={function(){togTag(tag);}} style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .15s',background:sel?'#ec4899':'rgba(255,255,255,0.05)',color:sel?'#fff':'#94a3b8',border:'1px solid '+(sel?'#ec4899':'rgba(255,255,255,0.1)')}}>{tag}</button>;})}
          </div>
        </div>
      )}
      <div>
        <div style={{fontSize:10,color:'#64748b',marginBottom:6,fontWeight:600}}>ATRIBUTOS</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {sAttrs.map(function(a){const w=posW[a]||0;return(
            <div key={a}>
              <div style={{fontSize:9,marginBottom:3,color:w>.25?'#ec4899':w>.1?'#8b5cf6':'#475569',fontWeight:w>0?700:400}}>{ATTR_LB[a]}{w>0?' ×'+w:''}</div>
              <div style={{height:3,borderRadius:2,background:'rgba(255,255,255,0.07)',overflow:'hidden',marginBottom:4}}><div style={{height:'100%',width:((attrs[a]-4)/6*100)+'%',background:w>.25?'#ec4899':w>.1?'#8b5cf6':'#334155',borderRadius:2}}/></div>
              <select value={attrs[a]} onChange={function(e){setA(a,parseFloat(e.target.value));}} disabled={saving} className="inp" style={{padding:'6px 10px',fontSize:12}}>
                {RTNG.map(function(v){return <option key={v} value={v}>{v%1===0?v+'.0':''+v}</option>;})}
              </select>
            </div>
          );})}
        </div>
      </div>

  function handleWA(){const t=local;if(!t)return;function byPos(team,pos){return team.filter(function(p){return p.position===pos;}).map(function(p){return p.name;});}function fmt(team,nome,avg){const ls=['⚽ '+nome+' - Média: '+avg];POSITIONS.forEach(function(pos){const ns=byPos(team,pos);if(ns.length)ls.push(pos+': '+ns.join(', '));});return ls.join('\n');}const txt=['Preparem-se para ficar putos!! Saiu a escalação da TiA para nossa pela de segunda:','',fmt(t.preto,'Preto',t.avgP),'',fmt(t.rosa,'Rosa',t.avgR)].join('\n');window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');}

        <TeamField team={t.preto} isBlack={true} label="TIME PRETO" avgOvr={t.avgP} swapId={swapId} onCk={handleClick}/>

        <button onClick={handleDownload} style={{background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.25)',borderRadius:12,padding:'11px 4px',fontSize:11,fontWeight:700,color:'#818cf8',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}><LIcon name="Download" size={12} fb="⬇"/> Download</button>
        <button onClick={handleWA} style={{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:12,padding:'11px 4px',fontSize:11,fontWeight:700,color:'#4ade80',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}><span>📲</span> WhatsApp</button>
      </div>

      </div>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {tab==='elenco'  && <ElencoTab  players={players} onAdd={addP} onDel={delP} onEdit={editP} saving={saving} loading={loading}/>}
        {tab==='pelada'  && <ConvoTab   players={players} selected={selected} onToggle={togPlayer} onToggleAll={togAll} onSort={doSort} ppt={ppt} setPpt={setPpt} loading={loading} sorting={sorting}/>}
        {tab==='times'   && <TimesTab   teams={teams} onResort={doSort} sorting={sorting}/>}
        {tab==='jogador' && <JogadorTab players={players}/>}
      </div>
      <div className="glass" style={{flexShrink:0,display:'flex',borderTop:'1px solid rgba(255,255,255,0.06)',paddingBottom:'max(10px,env(safe-area-inset-bottom))'}}>
        {TABS.map(function(tc){const active=tab===tc.id;const hasDot=tc.id==='times'&&teams!=null;return(
          <button key={tc.id} onClick={function(){setTab(tc.id);}} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 4px 8px',background:'none',border:'none',cursor:'pointer',color:active?'#ec4899':'#334155',transition:'color .15s',position:'relative'}}>
            <span style={{position:'relative',lineHeight:1}}><LIcon name={tc.icon} size={19} fb={tc.fb}/>{hasDot&&<span style={{position:'absolute',top:-3,right:-5,width:7,height:7,borderRadius:'50%',background:'#ec4899',border:'1.5px solid #0a0f1e'}}/>}</span>
            <span style={{fontSize:8,fontWeight:active?800:400,letterSpacing:'0.05em'}}>{tc.lbl.toUpperCase()}</span>
            {active&&<div style={{width:18,height:2,borderRadius:1,background:'linear-gradient(90deg,#ec4899,#8b5cf6)'}}/>}
          </button>
        );})}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
